<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trimmer - Twelve Labs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .upload-area:hover {
            background: #f5f7ff;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .prompt-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
            margin-top: 30px;
        }
        
        .clip-item {
            background: #f5f7ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .clip-info {
            flex: 1;
        }
        
        .download-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Video Trimmer</h1>
        <p class="subtitle">Upload a video and describe what you want to extract</p>
        
        <form id="uploadForm">
            <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                <p id="uploadText">📁 Click to upload video</p>
            </div>
            <input type="file" id="videoFile" name="video" accept="video/*" required>
            
            <input 
                type="text" 
                class="prompt-input" 
                id="prompt" 
                name="prompt" 
                placeholder="e.g., 'people laughing' or 'sunset scenes'"
                required
            >
            
            <button type="submit" class="btn" id="submitBtn">✨ Find & Trim Clips</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Processing video... This may take a few minutes</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <h2>📹 Found Clips</h2>
            <div id="clipsList"></div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('uploadForm');
        const videoFile = document.getElementById('videoFile');
        const uploadText = document.getElementById('uploadText');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const clipsList = document.getElementById('clipsList');
        const errorDiv = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');
        
        videoFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadText.textContent = `✅ ${e.target.files[0].name}`;
            }
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            
            // Show loading
            loading.style.display = 'block';
            submitBtn.disabled = true;
            results.style.display = 'none';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Display results
                clipsList.innerHTML = '';
                data.clips.forEach((clip, index) => {
                    const clipItem = document.createElement('div');
                    clipItem.className = 'clip-item';
                    clipItem.innerHTML = `
                        <div class="clip-info">
                            <strong>Clip ${index + 1}</strong><br>
                            ${clip.start.toFixed(1)}s - ${clip.end.toFixed(1)}s
                            (Score: ${(clip.score * 100).toFixed(0)}%)
                        </div>
                        <a href="/download/${clip.filename}" class="download-btn">⬇️ Download</a>
                    `;
                    clipsList.appendChild(clipItem);
                });
                
                results.style.display = 'block';
                
            } catch (error) {
                errorDiv.textContent = `❌ Error: ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
